<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>PF Analysis</title>

<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:#f4f6fa;
color:#111827;
overflow-x:hidden;
}

/* ================= TOP BAR ================= */

.topbar{
width:100%;
background:#fff;
padding:14px 18px;
display:flex;
justify-content:space-between;
align-items:center;
border:1px solid #e5e7eb;
border-radius:12px;
margin-bottom:14px;
}

.left-controls{
display:flex;
align-items:center;
gap:12px;
}

.live-dot{
width:10px;
height:10px;
border-radius:50%;
background:#22c55e;
box-shadow:0 0 0 4px rgba(34,197,94,0.2);
}

.date-input{
padding:10px 14px;
border:1px solid #d1d5db;
border-radius:8px;
font-family:'Poppins';
font-size:13px;
outline:none;
background:#fff;
}

.btn{
padding:10px 20px;
border:none;
border-radius:8px;
font-family:'Poppins';
font-weight:600;
cursor:pointer;
background:#2563eb;
color:#fff;
transition:0.2s;
}

.btn:hover{
background:#1d4ed8;
}

.status{
font-size:12px;
color:#64748b;
}

/* ================= KPI ================= */

.kpi-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:14px;
margin-bottom:14px;
}

.kpi-card{
background:#fff;
border-radius:12px;
border:1px solid #e5e7eb;
padding:18px;
position:relative;
overflow:hidden;
min-height:135px;
}

.kpi-card::before{
content:'';
position:absolute;
left:0;
top:0;
bottom:0;
width:4px;
}

.c1::before{background:#22c55e;}
.c2::before{background:#f59e0b;}
.c3::before{background:#2563eb;}
.c4::before{background:#ef4444;}

.kpi-title{
font-size:11px;
letter-spacing:2px;
text-transform:uppercase;
font-weight:600;
color:#94a3b8;
margin-bottom:12px;
}

.kpi-value{
font-size:42px;
font-weight:700;
line-height:1;
margin-bottom:10px;
}

.kpi-unit{
font-size:18px;
font-weight:500;
color:#94a3b8;
}

.kpi-footer{
display:flex;
align-items:center;
gap:8px;
font-size:11px;
color:#94a3b8;
margin-top:10px;
}

.live-badge{
background:#dcfce7;
color:#15803d;
padding:4px 8px;
border-radius:6px;
font-size:10px;
font-weight:700;
}

/* ================= CHART ================= */

.chart-card{
background:#fff;
border-radius:12px;
border:1px solid #e5e7eb;
margin-bottom:14px;
overflow:hidden;
}

.chart-header{
padding:14px 18px;
border-bottom:1px solid #e5e7eb;
font-size:20px;
font-weight:700;
}

.chart-body{
padding:10px;
}

#pfTrend{
height:420px;
}

#pfScatter{
height:420px;
}

/* ================= TABLE ================= */

.table-card{
background:#fff;
border-radius:12px;
border:1px solid #e5e7eb;
overflow:hidden;
}

table{
width:100%;
border-collapse:collapse;
}

thead{
background:#f8fafc;
}

th{
padding:12px;
font-size:11px;
letter-spacing:1px;
text-transform:uppercase;
text-align:left;
border-bottom:1px solid #e5e7eb;
color:#64748b;
}

td{
padding:12px;
font-size:13px;
border-bottom:1px solid #f1f5f9;
}

tr:hover td{
background:#f8fafc;
}

/* ================= RESPONSIVE ================= */

@media(max-width:1200px){

.kpi-grid{
grid-template-columns:repeat(2,1fr);
}

}

@media(max-width:768px){

.kpi-grid{
grid-template-columns:1fr;
}

.topbar{
flex-direction:column;
align-items:flex-start;
gap:10px;
}

}

</style>
</head>

<body>

<!-- ================= TOP BAR ================= -->

<div class="topbar">

<div class="left-controls">

<div class="live-dot"></div>

<label style="font-size:13px;color:#64748b;">
Date
</label>

<input type="date" id="reportDate" class="date-input">

<button class="btn" onclick="generateReport()">
▶ Analyze
</button>

</div>

<div class="status" id="statusText">
Waiting for analysis...
</div>

</div>

<!-- ================= KPI ================= -->

<div class="kpi-grid">

<div class="kpi-card c1">

<div class="kpi-title">
Average PF
</div>

<div class="kpi-value" id="avgPF">
--
</div>

<div class="kpi-footer">
<span class="live-badge">LIVE</span>
<span>Average from telemetry</span>
</div>

</div>

<div class="kpi-card c2">

<div class="kpi-title">
Minimum PF
</div>

<div class="kpi-value" id="minPF">
--
</div>

<div class="kpi-footer">
<span class="live-badge">LIVE</span>
<span>Lowest PF detected</span>
</div>

</div>

<div class="kpi-card c3">

<div class="kpi-title">
Low PF Duration
</div>

<div class="kpi-value">
<span id="lowPFDuration">--</span>
<span class="kpi-unit">Min</span>
</div>

<div class="kpi-footer">
<span class="live-badge">LIVE</span>
<span>PF below 0.90</span>
</div>

</div>

<div class="kpi-card c4">

<div class="kpi-title">
Estimated Penalty
</div>

<div class="kpi-value">
₹ <span id="penalty">--</span>
</div>

<div class="kpi-footer">
<span class="live-badge">LIVE</span>
<span>Estimated</span>
</div>

</div>

</div>

<!-- ================= TREND ================= -->

<div class="chart-card">

<div class="chart-header">
PF Trend With Active Power
</div>

<div class="chart-body">
<div id="pfTrend"></div>
</div>

</div>

<!-- ================= SCATTER ================= -->

<div class="chart-card">

<div class="chart-header">
PF vs Active Power
</div>

<div class="chart-body">
<div id="pfScatter"></div>
</div>

</div>

<!-- ================= TABLE ================= -->

<div class="table-card">

<div class="chart-header">
PF Event Table
</div>

<table>

<thead>

<tr>
<th>Timestamp</th>
<th>PF</th>
<th>Active Power</th>
<th>Status</th>
</tr>

</thead>

<tbody id="eventTable"></tbody>

</table>

</div>

<script>

/* ================= CONFIG ================= */

const DEVICE_ID =
"1250b550-5bdb-11f0-9b14-15d3b3a473c1";

const TELEMETRY_KEY =
"chiller_plant_1";

/* ================= DEFAULT DATE ================= */

document.addEventListener("DOMContentLoaded",()=>{

const d = new Date();

document.getElementById("reportDate").value =
d.toISOString().slice(0,10);

});

/* ================= TOKEN ================= */

async function getToken(){

try{

let token =
localStorage.getItem("jwt_token");

if(!token){
token = sessionStorage.getItem("jwt_token");
}

if(token){

try{
token = JSON.parse(token);
}catch(e){}

}

return token || "";

}catch(e){

return "";

}

}

/* ================= FETCH ================= */

async function fetchTelemetry(startTs,endTs){

const token = await getToken();

const url =
"/api/plugins/telemetry/DEVICE/"
+
DEVICE_ID
+
"/values/timeseries"
+
"?keys="
+
TELEMETRY_KEY
+
"&startTs="
+
startTs
+
"&endTs="
+
endTs
+
"&limit=50000&agg=NONE";

const response = await fetch(url,{

method:"GET",

headers:{
"Content-Type":"application/json",
"X-Authorization":"Bearer " + token
}

});

if(!response.ok){

throw new Error(
"Telemetry API Error : " + response.status
);

}

const json = await response.json();

const rows =
json[TELEMETRY_KEY] || [];

const parsed = [];

rows.forEach(r=>{

try{

const obj =
typeof r.value === "string"
?
JSON.parse(r.value)
:
r.value;

parsed.push({

ts:+r.ts,

PF:
parseFloat(
obj["18_Avg_PF"] || 0
),

ActPower:
parseFloat(
obj["18_Act_Power_Total"] || 0
),

Energy:
parseFloat(
obj["18_Act_Energy_Total"] || 0
)

});

}catch(e){}

});

return parsed.sort((a,b)=>a.ts-b.ts);

}

/* ================= MAIN ================= */

async function generateReport(){

try{

document.getElementById("statusText").innerHTML =
"Loading telemetry...";

const selectedDate =
document.getElementById("reportDate").value;

const startTs =
new Date(selectedDate + "T00:00:00").getTime();

const endTs =
new Date(selectedDate + "T23:59:59").getTime();

const data =
await fetchTelemetry(startTs,endTs);

if(!data.length){

alert("No telemetry found");

return;

}

/* ================= KPI ================= */

const pfValues =
data
.map(x=>x.PF)
.filter(x=>!isNaN(x));

const avgPF =
pfValues.reduce((a,b)=>a+b,0)
/
pfValues.length;

const minPF =
Math.min(...pfValues);

const lowPFCount =
pfValues.filter(x=>x < 0.90).length;

const lowPFDuration =
lowPFCount;

const estimatedPenalty =
(lowPFDuration * 12).toFixed(0);

document.getElementById("avgPF").innerHTML =
avgPF.toFixed(3);

document.getElementById("minPF").innerHTML =
minPF.toFixed(3);

document.getElementById("lowPFDuration").innerHTML =
lowPFDuration;

document.getElementById("penalty").innerHTML =
estimatedPenalty;

/* ================= STATUS ================= */

document.getElementById("statusText").innerHTML =
data.length + " Samples Loaded";

/* ================= TREND ================= */

Plotly.newPlot("pfTrend",[

{
x:data.map(x=>new Date(x.ts)),
y:data.map(x=>x.PF),

name:"Power Factor",

mode:"lines",

line:{
color:"#2563eb",
width:2
}
},

{
x:data.map(x=>new Date(x.ts)),
y:data.map(x=>x.ActPower),

name:"Active Power",

mode:"lines",

yaxis:"y2",

line:{
color:"#ef4444",
width:2
}
}

],

{

paper_bgcolor:"transparent",
plot_bgcolor:"transparent",

margin:{
t:20,
l:50,
r:50,
b:40
},

xaxis:{
title:"Time"
},

yaxis:{
title:"PF",
range:[0,1.2]
},

yaxis2:{
title:"kW",
overlaying:"y",
side:"right"
},

legend:{
orientation:"h"
}

},

{
responsive:true,
displayModeBar:false
}

/* ================= SCATTER ================= */

);

Plotly.newPlot("pfScatter",[

{
x:data.map(x=>x.ActPower),
y:data.map(x=>x.PF),

mode:"markers",

marker:{
size:7,
color:data.map(x=>x.PF),
colorscale:"RdYlGn",
showscale:true
},

name:"PF"

}

],

{

paper_bgcolor:"transparent",
plot_bgcolor:"transparent",

margin:{
t:20,
l:50,
r:20,
b:50
},

xaxis:{
title:"Active Power (kW)"
},

yaxis:{
title:"Power Factor",
range:[0,1.2]
}

},

{
responsive:true,
displayModeBar:false
}

/* ================= TABLE ================= */

);

const tbody =
document.getElementById("eventTable");

tbody.innerHTML = "";

data.forEach(row=>{

let status = "NORMAL";

if(row.PF < 0.90){
status = "LOW PF";
}

const tr =
document.createElement("tr");

tr.innerHTML = `

<td>
${new Date(row.ts).toLocaleString()}
</td>

<td>
${row.PF.toFixed(3)}
</td>

<td>
${row.ActPower.toFixed(2)} kW
</td>

<td>
${status}
</td>

`;

tbody.appendChild(tr);

});

}catch(err){

console.error(err);

document.getElementById("statusText").innerHTML =
"Error loading data";

alert(err.message);

}

}

</script>

</body>
</html>
